services:
  fuelcast-frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # This protects the container's modules
      - /app/.next
    environment:
      - WATCHPACK_POLLING=true # Vital for Next.js on Windows

  fuelcast-backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./machine-learning:/machine-learning:ro
    environment:
      - WATCHFILES_FORCE_POLLING=true 